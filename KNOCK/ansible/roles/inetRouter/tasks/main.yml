---
- name: Install knockd
  apt:
    name:
      - knockd
      - iptables-persistent
    state: present
    update_cache: yes

- name: Enable IP forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: yes

- name: Configure NAT
  shell: |
    iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
  ignore_errors: true

