---
- name: Install packages
  apt:
    name:
      - vim
      - traceroute
      - tcpdump
      - net-tools
      - iptables
    update_cache: yes

- name: Remove file
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/60-cloudimg-settings.conf
    state: absent
  notify: restart sshd
- debug:
    var: host.stdout
