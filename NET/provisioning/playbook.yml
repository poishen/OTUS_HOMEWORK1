---
- hosts: all
  become: yes
  tasks:
    - name: Stop and disable NetworkManager
      service:
        name: NetworkManager
        state: stopped
        enabled: no
      ignore_errors: yes

    - name: Enable network service
      service:
        name: network
        state: started
        enabled: yes

    - name: Remove NM_CONTROLLED from all ifcfg files
      shell: |
        for i in /etc/sysconfig/network-scripts/ifcfg-eth*; do
          grep -q 'NM_CONTROLLED' "$i" && sed -i 's/^NM_CONTROLLED=.*/NM_CONTROLLED=no/' "$i" || echo 'NM_CONTROLLED=no' >> "$i"
        done
      ignore_errors: yes

    - name: Mask NetworkManager
      systemd:
        name: NetworkManager
        masked: yes
      ignore_errors: yes

    - name: Disable default route on eth0
      lineinfile:
        path: /etc/sysconfig/network-scripts/ifcfg-eth0
        line: "DEFROUTE=no"
        create: no
      when: inventory_hostname != "inetRouter"

    - name: Enable IP forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: 1
        sysctl_set: yes
        state: present
        reload: yes
      when: inventory_hostname in ["inetRouter", "centralRouter", "office1Router", "office2Router"]

    - name: Gateway for centralRouter
      lineinfile:
        path: /etc/sysconfig/network-scripts/ifcfg-eth1
        line: "GATEWAY=192.168.255.1"
      when: inventory_hostname == "centralRouter"

    - name: Gateway for centralServer
      lineinfile:
        path: /etc/sysconfig/network-scripts/ifcfg-eth1
        line: "GATEWAY=192.168.0.1"
      when: inventory_hostname == "centralServer"

    - name: Gateway for office1Router
      lineinfile:
        path: /etc/sysconfig/network-scripts/ifcfg-eth1
        line: "GATEWAY=192.168.255.5"
      when: inventory_hostname == "office1Router"

    - name: Gateway for office2Router
      lineinfile:
        path: /etc/sysconfig/network-scripts/ifcfg-eth1
        line: "GATEWAY=192.168.255.9"
      when: inventory_hostname == "office2Router"

    - name: Gateway for office1Server
      lineinfile:
        path: /etc/sysconfig/network-scripts/ifcfg-eth1
        line: "GATEWAY=192.168.2.1"
      when: inventory_hostname == "office1Server"

    - name: Gateway for office2Server
      lineinfile:
        path: /etc/sysconfig/network-scripts/ifcfg-eth1
        line: "GATEWAY=192.168.1.1"
      when: inventory_hostname == "office2Server"

    - name: Route to office1 network on centralRouter
      lineinfile:
        path: /etc/sysconfig/network-scripts/route-eth5
        line: "192.168.2.0/24 via 192.168.255.6"
        create: yes
      when: inventory_hostname == "centralRouter"

    - name: Route to office2 network on centralRouter
      lineinfile:
        path: /etc/sysconfig/network-scripts/route-eth6
        line: "192.168.1.0/24 via 192.168.255.10"
        create: yes
      when: inventory_hostname == "centralRouter"

    - name: Route to central networks via centralRouter
      lineinfile:
        path: /etc/sysconfig/network-scripts/route-eth1
        line: "{{ item }}"
        create: yes
      loop:
        - "192.168.0.0/24 via 192.168.255.2"
        - "192.168.2.0/24 via 192.168.255.2"
        - "192.168.1.0/24 via 192.168.255.2"
      when: inventory_hostname == "inetRouter"

    - name: MASQUERADE for internal networks
      iptables:
        table: nat
        chain: POSTROUTING
        out_interface: eth0
        jump: MASQUERADE
        source: "192.168.0.0/16"
        comment: "NAT internal nets"
      when: inventory_hostname == "inetRouter"

    - name: MASQUERADE for office1
      iptables:
        table: nat
        chain: POSTROUTING
        out_interface: eth0
        jump: MASQUERADE
        source: "192.168.2.0/24"
      when: inventory_hostname == "inetRouter"

    - name: MASQUERADE for office2
      iptables:
        table: nat
        chain: POSTROUTING
        out_interface: eth0
        jump: MASQUERADE
        source: "192.168.1.0/24"
      when: inventory_hostname == "inetRouter"

    - name: MASQUERADE for transit
      iptables:
        table: nat
        chain: POSTROUTING
        out_interface: eth0
        jump: MASQUERADE
        source: "192.168.255.0/24"
      when: inventory_hostname == "inetRouter"

    - name: Install iptables-services from vault
      shell: |
        yum install -y iptables-services --releasever=7 2>/dev/null || \
        rpm -ivh http://vault.centos.org/7.9.2009/os/x86_64/Packages/iptables-services-1.4.21-35.el7.x86_64.rpm 2>/dev/null || true
      when: inventory_hostname == "inetRouter"
      ignore_errors: yes

    - name: Save iptables rules
      shell: iptables-save > /etc/sysconfig/iptables
      when: inventory_hostname == "inetRouter"
      ignore_errors: yes

    - name: FORCE default route centralRouter
      command: ip route replace default via 192.168.255.1 dev eth1
      when: inventory_hostname == "centralRouter"
      ignore_errors: yes

    - name: FORCE routes on inetRouter
      command: "ip route replace {{ item }}"
      loop:
        - "192.168.0.0/24 via 192.168.255.2 dev eth1"
        - "192.168.2.0/24 via 192.168.255.2 dev eth1"
        - "192.168.1.0/24 via 192.168.255.2 dev eth1"
      when: inventory_hostname == "inetRouter"
      ignore_errors: yes

    - name: FORCE default route centralServer
      command: ip route replace default via 192.168.0.1 dev eth1
      when: inventory_hostname == "centralServer"
      ignore_errors: yes

    - name: FORCE default route office1Router
      command: ip route replace default via 192.168.255.5 dev eth1
      when: inventory_hostname == "office1Router"
      ignore_errors: yes

    - name: FORCE default route office2Router
      command: ip route replace default via 192.168.255.9 dev eth1
      when: inventory_hostname == "office2Router"
      ignore_errors: yes

    - name: FORCE default route office1Server
      command: ip route replace default via 192.168.2.1 dev eth1
      when: inventory_hostname == "office1Server"
      ignore_errors: yes

    - name: FORCE default route office2Server
      command: ip route replace default via 192.168.1.1 dev eth1
      when: inventory_hostname == "office2Server"
      ignore_errors: yes

    - name: FORCE route office1 on centralRouter
      command: ip route replace 192.168.2.0/24 via 192.168.255.6 dev eth5
      when: inventory_hostname == "centralRouter"
      ignore_errors: yes

    - name: FORCE route office2 on centralRouter
      command: ip route replace 192.168.1.0/24 via 192.168.255.10 dev eth6
      when: inventory_hostname == "centralRouter"
      ignore_errors: yes

    - name: Remove default route via eth0
      command: ip route del default via 10.0.2.2 dev eth0
      when: inventory_hostname != "inetRouter"
      ignore_errors: yes

  handlers:
    - name: restart network
      service:
        name: network
        state: restarted
      ignore_errors: yes
